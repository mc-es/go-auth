version: "2"

pre-commit:
  parallel: true
  commands:
    lint:
      stage_fixed: true
      run: golangci-lint run
    vet:
      run: go vet ./...
    tidy:
      stage_fixed: true
      run: go mod tidy
    verify:
      run: go mod verify

commit-msg:
  parallel: false
  commands:
    commit-check:
      run: go run ./cmd/commitcheck {1}

pre-push:
  parallel: false
  commands:
    vuln:
      run: govulncheck ./...
