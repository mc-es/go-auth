# project paths
root = "."
tmp_dir = "tmp"

[build]
  # build command and binary
  cmd = "go build -o ./tmp/main ./cmd/app"
  bin = "./tmp/main"

  # timing
  delay = 300

  # watch rules
  include_ext = ["go", "tpl", "tmpl", "env"]
  exclude_dir = ["assets", "tmp", "vendor", "dist", "build"]
  exclude_regex = ["_test.go"]
  exclude_unchanged = true

  # errors & logs
  stop_on_error = false
  log = "build-errors.log"

  # graceful shutdown
  send_interrupt = true
  kill_delay = "1s"

[color]
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = false

[misc]
  clean_on_exit = false

[proxy]
  app_port = 0
  enabled = false
  proxy_port = 0

[screen]
  clear_on_rebuild = true
  keep_scroll = true
